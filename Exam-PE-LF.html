  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Examen écrit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-overlay: rgba(10, 6, 20, 0.62);
      --surface: rgba(42, 31, 64, 0.90);
      --surface-2: rgba(51, 37, 76, 0.92);
      --text: #f3ecdd;
      --text-muted: #b3a3c9;
      --gold: #d8ab5c;
      --gold-bright: #eec27f;
      --rose: #d1668a;
      --rose-bg: rgba(209, 102, 138, 0.16);
      --border: rgba(216, 171, 92, 0.28);
      --shadow: 0 20px 60px rgba(10, 6, 20, 0.55);
      --radius: 14px;
      --radius-lg: 22px;
      --font-display: 'Cormorant Garamond', serif;
      --font-arabic: 'Amiri', serif;
      --font-body: 'Inter', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font-body);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      background-size: cover;
      background-position: center center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      position: relative;
      overflow-x: hidden;
      transition: background-image 0.5s ease;
    }
    body.exam-bg {
      background-image:
        linear-gradient(var(--bg-overlay), var(--bg-overlay)),
        url("A.png");
      background-size: cover, 36% auto;
      background-position: center center, center center;
      background-repeat: no-repeat, no-repeat;
    }
    body.done-bg {
      background-image:
        linear-gradient(var(--bg-overlay), var(--bg-overlay)),
        url("B.png");
      background-size: cover, 36% auto;
      background-position: center center, center center;
      background-repeat: no-repeat, no-repeat;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(243, 236, 221, 0.05) 1px, transparent 1px);
      background-size: 56px 56px;
      pointer-events: none;
      z-index: 0;
    }
    .hidden { display: none !important; }

    .container {
      width: min(760px, 100%);
      background: linear-gradient(180deg, var(--surface), var(--surface-2));
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 3rem 2.75rem;
      position: relative;
      z-index: 1;
      animation: rise 0.6s ease both;
      backdrop-filter: blur(6px);
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .corner {
      position: absolute;
      width: 26px;
      height: 26px;
      border: 1.5px solid var(--gold);
      opacity: 0.65;
    }
    .corner.tl { top: 14px; left: 14px; border-right: none; border-bottom: none; border-top-left-radius: 6px; }
    .corner.tr { top: 14px; right: 14px; border-left: none; border-bottom: none; border-top-right-radius: 6px; }
    .corner.bl { bottom: 14px; left: 14px; border-right: none; border-top: none; border-bottom-left-radius: 6px; }
    .corner.br { bottom: 14px; right: 14px; border-left: none; border-top: none; border-bottom-right-radius: 6px; }

    h1 {
      font-family: var(--font-display);
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      margin-bottom: 0.6rem;
      color: var(--gold-bright);
    }
    .flourish {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin-bottom: 1.4rem;
    }
    .flourish::before, .flourish::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .flourish span {
      width: 6px;
      height: 6px;
      background: var(--gold);
      transform: rotate(45deg);
      flex-shrink: 0;
    }
    .subtitle {
      color: var(--text-muted);
      margin-bottom: 2.2rem;
      font-size: 0.98rem;
      line-height: 1.65;
    }
