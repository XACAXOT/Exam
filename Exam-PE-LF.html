<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Examen écrit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-overlay: rgba(10, 6, 20, 0.62);
      --surface: rgba(42, 31, 64, 0.90);
      --surface-2: rgba(51, 37, 76, 0.92);
      --text: #f3ecdd;
      --text-muted: #b3a3c9;
      --gold: #d8ab5c;
      --gold-bright: #eec27f;
      --rose: #d1668a;
      --rose-bg: rgba(209, 102, 138, 0.16);
      --border: rgba(216, 171, 92, 0.28);
      --shadow: 0 20px 60px rgba(10, 6, 20, 0.55);
      --radius: 14px;
      --radius-lg: 22px;
      --font-display: 'Cormorant Garamond', serif;
      --font-arabic: 'Amiri', serif;
      --font-body: 'Inter', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font-body);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      position: relative;
      overflow-x: hidden;
      background: #09060f;
      transition: background-image 0.5s ease;
    }

    body.exam-bg::before,
    body.done-bg::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--bg-overlay), var(--bg-overlay)),
        url("A.png");
      background-size: cover, cover;
      background-position: center center, center center;
      background-repeat: no-repeat, no-repeat;
      clip-path: polygon(0 0, 34% 0, 34% 100%, 0 100%);
      z-index: 0;
      pointer-events: none;
      opacity: 1;
    }

    body.exam-bg::after,
    body.done-bg::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--bg-overlay), var(--bg-overlay)),
        url("A.png");
      background-size: cover, cover;
      background-position: center center, center center;
      background-repeat: no-repeat, no-repeat;
      clip-path: polygon(66% 0, 100% 0, 100% 100%, 66% 100%);
      z-index: 0;
      pointer-events: none;
      opacity: 1;
    }

    body.done-bg::before,
    body.done-bg::after {
      background-image:
        linear-gradient(var(--bg-overlay), var(--bg-overlay)),
        url("B.png");
    }

    .hidden { display: none !important; }

    .container {
      width: min(760px, 100%);
      background: linear-gradient(180deg, var(--surface), var(--surface-2));
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 3rem 2.75rem;
      position: relative;
      z-index: 1;
      animation: rise 0.6s ease both;
      backdrop-filter: blur(6px);
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .corner {
      position: absolute;
      width: 26px;
      height: 26px;
      border: 1.5px solid var(--gold);
      opacity: 0.65;
    }
    .corner.tl { top: 14px; left: 14px; border-right: none; border-bottom: none; border-top-left-radius: 6px; }
    .corner.tr { top: 14px; right: 14px; border-left: none; border-bottom: none; border-top-right-radius: 6px; }
    .corner.bl { bottom: 14px; left: 14px; border-right: none; border-top: none; border-bottom-left-radius: 6px; }
    .corner.br { bottom: 14px; right: 14px; border-left: none; border-top: none; border-bottom-right-radius: 6px; }

    h1 {
      font-family: var(--font-display);
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      margin-bottom: 0.6rem;
      color: var(--gold-bright);
    }
    .flourish {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin-bottom: 1.4rem;
    }
    .flourish::before, .flourish::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .flourish span {
      width: 6px;
      height: 6px;
      background: var(--gold);
      transform: rotate(45deg);
      flex-shrink: 0;
    }
    .subtitle {
      color: var(--text-muted);
      margin-bottom: 2.2rem;
      font-size: 0.98rem;
      line-height: 1.65;
    }
    label {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 1.02rem;
      margin-bottom: 0.5rem;
      display: block;
      color: var(--text);
    }
    input, textarea {
      width: 100%;
      padding: 0.95rem 1.1rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      font-family: var(--font-body);
      background: rgba(25, 18, 40, 0.55);
      color: var(--text);
      transition: border 0.2s, box-shadow 0.2s, background 0.2s;
    }
    input::placeholder, textarea::placeholder { color: rgba(179, 163, 201, 0.55); }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--gold);
      background: rgba(25, 18, 40, 0.8);
      box-shadow: 0 0 0 3px rgba(216, 171, 92, 0.18);
    }
    textarea {
      resize: vertical;
      min-height: 160px;
      line-height: 1.6;
    }
    button {
      padding: 0.95rem 1.9rem;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-family: var(--font-body);
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 0.01em;
      transition: transform 0.12s, box-shadow 0.2s, filter 0.2s;
    }
    button:active { transform: translateY(1px); }
    .primary {
      background: linear-gradient(135deg, var(--gold-bright), var(--gold));
      color: #241a38;
      box-shadow: 0 8px 22px rgba(216, 171, 92, 0.28);
    }
    .primary:hover { filter: brightness(1.06); box-shadow: 0 10px 26px rgba(216, 171, 92, 0.4); }

    .meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.6rem;
      padding: 0.9rem 1.2rem;
      background: rgba(25, 18, 40, 0.45);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .meta-item {
      display: flex;
      gap: 0.5rem;
      align-items: baseline;
    }
    .meta-item small {
      color: var(--text-muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .meta-item strong {
      font-size: 0.95rem;
      font-family: var(--font-display);
      font-weight: 600;
    }
    .timer {
      padding: 0.35rem 0.95rem;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.95rem;
      font-family: var(--font-body);
      background: rgba(216, 171, 92, 0.16);
      color: var(--gold-bright);
      border: 1px solid rgba(216, 171, 92, 0.4);
    }
    .timer.warning {
      background: var(--rose-bg);
      color: var(--rose);
      border-color: rgba(209, 102, 138, 0.55);
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .beads {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 2rem;
    }
    .bead {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: rgba(216, 171, 92, 0.18);
      border: 1px solid rgba(216, 171, 92, 0.35);
      transition: background 0.3s, box-shadow 0.3s, transform 0.3s;
    }
    .bead.filled {
      background: var(--gold-bright);
      box-shadow: 0 0 8px rgba(238, 194, 127, 0.7);
      transform: scale(1.15);
    }
    .bead.current {
      border-color: var(--gold-bright);
      transform: scale(1.3);
    }

    .question-label {
      color: var(--gold);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      margin-bottom: 0.6rem;
      font-weight: 600;
    }
    .question-title {
      font-family: var(--font-arabic);
      font-size: 1.55rem;
      margin-bottom: 1.3rem;
      line-height: 1.9;
      white-space: pre-wrap;
      color: var(--text);
    }
    .question-title, #answerBox { direction: rtl; text-align: right; }

    .done-box {
      background: rgba(25, 18, 40, 0.45);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.6rem;
      margin-bottom: 1.6rem;
      overflow: hidden;
      position: relative;
    }
    .done-box::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(20, 14, 32, 0.48), rgba(20, 14, 32, 0.48)),
        url("B.png");
      background-size: cover, 220px auto;
      background-position: center center, center center;
      background-repeat: no-repeat, no-repeat;
      opacity: 0.35;
      pointer-events: none;
    }
    .done-box > * {
      position: relative;
      z-index: 1;
    }
    .done-box > h3 {
      font-family: var(--font-display);
      font-size: 1.2rem;
      color: var(--gold-bright);
      font-weight: 600;
    }
    .answer-item {
      padding: 1rem 1.1rem;
      margin-bottom: 0.9rem;
      background: rgba(51, 37, 76, 0.5);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .answer-item h3 {
      font-size: 0.72rem;
      margin-bottom: 0.5rem;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-family: var(--font-body);
      font-weight: 600;
    }
    .answer-item .q {
      font-family: var(--font-arabic);
      font-weight: 400;
      margin-bottom: 0.5rem;
      white-space: pre-wrap;
      direction: rtl;
      text-align: right;
      color: var(--text);
      font-size: 1.05rem;
    }
    .answer-item .a {
      color: var(--text-muted);
      white-space: pre-wrap;
      font-size: 0.95rem;
      direction: auto;
    }
    #fullText { direction: auto; text-align: left; }

    .actions {
      display: flex;
      gap: 1rem;
      margin-top: 1.6rem;
    }
    .actions button { flex: 1; }
    .summary {
      color: var(--text-muted);
      margin-bottom: 1.2rem;
      font-size: 0.98rem;
      line-height: 1.6;
    }

    @media (max-width: 600px) {
      body { padding: 1.1rem; }
      .container { padding: 2rem 1.5rem; }
      h1 { font-size: 2rem; }
      .meta { flex-direction: column; align-items: flex-start; gap: 0.6rem; }
      .actions { flex-direction: column; }
      body.exam-bg::before,
